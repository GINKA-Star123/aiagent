services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - aiagent_net

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../cloud.tencent.env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URL: bolt://neo4j:7687
      WEB_CONCURRENCY: 2
    volumes:
      - aiagent_data:/app/data
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - aiagent_net

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../cloud.tencent.env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URL: bolt://neo4j:7687
      WORKER_CONCURRENCY: 1
      TASK_QUEUE_NAME: default
      TASK_POP_TIMEOUT_SECONDS: 5
    volumes:
      - aiagent_data:/app/data
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aiagent_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - aiagent_net

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aiagent_net

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/change-me-before-production
      NEO4J_dbms_security_auth__enabled: "true"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - aiagent_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../cloud.tencent.env
    environment:
      POSTGRES_DB: aiagent
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent -d aiagent"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - aiagent_net

volumes:
  aiagent_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  postgres_data:

networks:
  aiagent_net:
    driver: bridge
